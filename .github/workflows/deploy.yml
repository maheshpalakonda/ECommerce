name: Build, Push and Deploy to Amazon EKS

on:
  push:
    branches:
      - master

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: Ecommerce
  ECR_REPOSITORY: ecommerce
  ECR_REGISTRY: 360967147235.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} .

      - name: Tag Docker Images
        run: |
          docker tag $ECR_REPOSITORY:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker tag $ECR_REPOSITORY:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push Docker Images
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Install Argo Rollouts CLI
        run: |
          curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts-linux-amd64
          sudo mv kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

      - name: Verify Argo Rollouts CLI
        run: |
          kubectl argo rollouts version

      - name: Update Rollout Image
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

          sed -i "s|image: .*|image: $IMAGE|g" k8s/backend/rollout.yaml

      - name: Apply Rollout
        run: |
          kubectl apply -f k8s/backend/rollout.yaml

      - name: Verify Rollout Exists
        run: |
          kubectl get rollout ecommerce -n ecommerce

      - name: Show Rollout Status
        run: |
          kubectl argo rollouts get rollout ecommerce -n ecommerce

      - name: Deployment Completed
        run: |
          echo "========================================"
          echo "Deployment completed successfully."
          echo ""
          echo "Preview deployment has been created."
          echo ""
          echo "To monitor rollout:"
          echo "kubectl argo rollouts get rollout ecommerce -n ecommerce --watch"
          echo ""
          echo "To promote:"
          echo "kubectl argo rollouts promote ecommerce -n ecommerce"
          echo ""
          echo "To rollback:"
          echo "kubectl argo rollouts undo ecommerce -n ecommerce"
          echo "========================================"
