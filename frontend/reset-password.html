<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password - ShopNest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .form-container {
            text-align: center;
        }

        .form-container h3 {
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="resetForm" class="form-container">
            <h3>Reset Password</h3>
            <form id="passwordResetForm">
                <input type="hidden" id="token" name="token" />
                <input
                    type="password"
                    id="newPassword"
                    name="newPassword"
                    class="input-field"
                    placeholder="New Password"
                    required
                    autocomplete="new-password"
                />
                <input
                    type="password"
                    id="confirmNewPassword"
                    name="confirmNewPassword"
                    class="input-field"
                    placeholder="Confirm New Password"
                    required
                    autocomplete="new-password"
                />
                <button type="submit" class="btn">Reset Password</button>
            </form>
            <div id="message" class="message hidden"></div>
        </div>
    </div>

    <script>
        // Get token from URL query string
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            document.getElementById('token').value = token;
        }

        // Handle form submission
        document
            .getElementById('passwordResetForm')
            .addEventListener('submit', async (e) => {
                e.preventDefault();

                const token = document.getElementById('token').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmNewPassword = document.getElementById(
                    'confirmNewPassword'
                ).value;

                if (newPassword !== confirmNewPassword) {
                    showMessage('Passwords do not match', 'error');
                    return;
                }

                try {
                    const response = await fetch('http://localhost:3006/reset-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            token,
                            newPassword,
                            confirmNewPassword,
                        }),
                    });

                    const data = await response.json();

                    if (data.error) {
                        showMessage(data.message, 'error');
                    } else {
                        showMessage(data.message, 'success');
                        // Redirect to login after success
                        setTimeout(() => {
                            window.location.href = 'add to cart.html'; // Redirect to main page
                        }, 2000);
                    }
                } catch (error) {
                    showMessage('An error occurred. Please try again.', 'error');
                }
            });

        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            messageDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
